<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>නිදන් Hunt! - Advanced</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#ff6b35;--gold:#ffd700;--dark:#0a0a1e;--accent:#e94560;--cyan:#00ff88;--bg:linear-gradient(135deg,#0a0a1e,#1a1a3e)}
body{font-family:'Segoe UI',sans-serif;background:var(--dark);color:#fff;overflow:hidden;height:100vh;width:100vw;position:fixed;touch-action:none}
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#fogCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.leaflet-control-zoom{display:none!important}
.leaflet-attribution-flag,.leaflet-control-attribution{display:none!important}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:10;padding:6px 10px;background:linear-gradient(180deg,rgba(5,5,20,.95) 0%,transparent 100%);pointer-events:none}
#hud>*{pointer-events:auto}
.hud-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.hud-title{font-size:12px;font-weight:800;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.3);display:flex;align-items:center;gap:5px;letter-spacing:.5px}
.hud-title .v{font-size:7px;background:var(--accent);padding:1px 5px;border-radius:8px;color:#fff}
.hud-stats{display:flex;gap:5px}
.stat{background:rgba(0,0,0,.8);border:1px solid rgba(255,215,0,.2);border-radius:6px;padding:3px 8px;text-align:center;min-width:44px}
.stat .v{font-size:14px;font-weight:700;color:var(--gold);line-height:1.2}
.stat .l{font-size:7px;text-transform:uppercase;color:#888;letter-spacing:.3px}

/* Zone Progress Bar */
#zoneBar{position:absolute;top:52px;left:10px;right:10px;z-index:10;background:rgba(5,5,20,.85);border:1px solid rgba(255,215,0,.15);border-radius:10px;padding:6px 10px;backdrop-filter:blur(5px);pointer-events:none}
#zoneBar .zname{font-size:10px;color:var(--gold);display:flex;justify-content:space-between}
#zoneBar .zname span{color:#aaa;font-size:9px}
#zoneBar .track{height:4px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:4px;overflow:hidden}
#zoneBar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--primary));border-radius:3px;transition:width .5s ease;min-width:1%}

/* Scan Collection Ring */
#collectRing{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);z-index:10;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#0f8,#0a6);border:2px solid var(--cyan);box-shadow:0 0 20px rgba(0,255,136,.4),inset 0 0 15px rgba(0,255,136,.2);display:none;align-items:center;justify-content:center;font-size:16px;color:#fff;animation:collectPulse 1.5s infinite;pointer-events:none}
#collectRing.show{display:flex}
@keyframes collectPulse{0%{box-shadow:0 0 10px rgba(0,255,136,.3)}50%{box-shadow:0 0 30px rgba(0,255,136,.7),0 0 60px rgba(0,255,136,.2)}100%{box-shadow:0 0 10px rgba(0,255,136,.3)}}

/* Bottom Sheet */
#bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;background:linear-gradient(0deg,rgba(5,5,20,.98) 0%,rgba(10,10,30,.92) 100%);border-top:1px solid rgba(255,215,0,.2);border-radius:16px 16px 0 0;max-height:42vh;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px)}
#bottom.collapsed{transform:translateY(calc(100% - 42px))}
#bottom .h{width:36px;height:3px;background:var(--gold);border-radius:3px;margin:6px auto;opacity:.5;cursor:pointer}
#bottom .hdr{display:flex;justify-content:space-between;align-items:center;padding:2px 12px 6px;border-bottom:1px solid rgba(255,215,0,.08)}
#bottom .hdr h3{font-size:12px;color:var(--gold);display:flex;align-items:center;gap:5px}
#bottom .hdr h3 .b{background:var(--accent);color:#fff;font-size:8px;padding:0 6px;border-radius:8px}
#bottom .hdr .zonesel{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid rgba(255,215,0,.2);background:transparent;color:#aaa;cursor:pointer}
#bottom .hdr .zonesel:focus{outline:none;color:var(--gold);border-color:var(--gold)}
#list{overflow-y:auto;flex:1;padding:4px 8px 10px;-webkit-overflow-scrolling:touch}
#list::-webkit-scrollbar{width:2px}
#list::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* Mini zone cards in bottom sheet */
.zone-card{display:flex;align-items:center;gap:8px;padding:7px 8px;margin-bottom:3px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:.2s}
.zone-card:active{background:rgba(255,215,0,.12);transform:scale(.98)}
.zone-card .ico{font-size:18px;width:28px;text-align:center}
.zone-card .info{flex:1;min-width:0}
.zone-card .info .zn{font-size:12px;font-weight:700;color:#fff;display:flex;justify-content:space-between}
.zone-card .info .zn .pct{font-size:10px;color:var(--gold)}
.zone-card .info .bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;overflow:hidden}
.zone-card .info .bar .f{height:100%;border-radius:2px;transition:width .5s}
.zone-card .lock{font-size:14px;padding:4px}
.zone-card .lock.l{color:#555}
.zone-card .lock.u{color:var(--cyan)}

/* Treasure items in list */
.t-item{display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:2px;border-radius:6px;background:rgba(255,255,255,.03);cursor:pointer;transition:.15s}
.t-item:active{background:rgba(255,215,0,.1)}
.t-item .ico{font-size:16px;width:24px;text-align:center}
.t-item .inf{flex:1;min-width:0}
.t-item .inf .nm{font-size:11px;font-weight:600;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-item .inf .sb{font-size:9px;color:#777;display:flex;gap:6px}
.t-item .dist{font-size:9px;color:#555;white-space:nowrap}
.t-item .st{font-size:12px;padding:2px}
.t-item .st.f{color:var(--cyan)}
.t-item .st.m{color:#444}

/* Modal */
#modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)}
#modal.show{display:flex}
#modalBox{background:linear-gradient(145deg,#12122a,#1a1a3e);border:1px solid var(--gold);border-radius:18px;padding:22px;max-width:320px;width:88%;text-align:center;position:relative;animation:mIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{0%{transform:scale(.4) translateY(30px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
#modalBox .icon{font-size:56px;margin-bottom:6px}
#modalBox h2{font-size:18px;color:var(--gold);margin-bottom:2px}
#modalBox .tag{display:inline-block;padding:1px 10px;border-radius:8px;font-size:10px;margin-bottom:6px;font-weight:700}
#modalBox .desc{font-size:12px;color:#aaa;margin-bottom:8px;line-height:1.4}
#modalBox .meta{font-size:9px;color:#555;margin-bottom:10px}
#modalBox .rw{font-size:22px;color:var(--gold);margin-bottom:4px}
#modalBox .nrp{font-size:10px;color:#888;margin-bottom:12px}
#modalBox .act{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff;padding:10px 28px;border-radius:25px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(233,69,96,.3);transition:.2s}
#modalBox .act:active{transform:scale(.95);opacity:.8}

/* Unlock notification */
#unlockNotify{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(5,5,20,.95);border:2px solid var(--gold);border-radius:16px;padding:20px 28px;text-align:center;opacity:0;transition:all .4s;pointer-events:none;max-width:80%}
#unlockNotify.show{opacity:1;top:45%}
#unlockNotify .ico{font-size:40px;margin-bottom:6px}
#unlockNotify h3{font-size:16px;color:var(--gold);margin-bottom:4px}
#unlockNotify p{font-size:12px;color:#aaa}

/* Toast */
#toast{position:fixed;top:55px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(5,5,20,.92);border:1px solid rgba(255,215,0,.3);border-radius:10px;padding:8px 16px;font-size:12px;color:var(--gold);opacity:0;transition:all .35s;pointer-events:none;text-align:center;max-width:85%;backdrop-filter:blur(4px)}
#toast.show{opacity:1;top:62px}

/* Achievement popup */
#achieve{position:fixed;top:55px;right:10px;z-index:60;background:rgba(5,5,20,.92);border:1px solid var(--gold);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--gold);opacity:0;transition:all .4s;pointer-events:none;max-width:200px;backdrop-filter:blur(4px)}
#achieve.show{opacity:1}
#achieve .aico{font-size:18px;display:block;text-align:center}

/* User dot */
.user-dot{width:12px;height:12px;background:#0af;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(0,170,255,.6);animation:uPulse 2s infinite}
@keyframes uPulse{0%{box-shadow:0 0 12px rgba(0,170,255,.6)}50%{box-shadow:0 0 24px rgba(0,170,255,.9)}100%{box-shadow:0 0 12px rgba(0,170,255,.6)}}

/* Direction indicator */
#dirArrow{position:absolute;bottom:calc(50% + 30px);left:50%;transform:translateX(-50%);z-index:10;font-size:28px;opacity:0;transition:opacity .5s;pointer-events:none;text-shadow:0 0 15px rgba(255,215,0,.5)}
#dirArrow.show{opacity:1}

/* GPS Status */
#gpsStatus{position:absolute;top:52px;right:10px;z-index:10;font-size:9px;padding:2px 8px;border-radius:8px;display:flex;align-items:center;gap:4px;pointer-events:none;transition:.3s}
#gpsStatus.good{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--cyan)}
#gpsStatus.fair{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:var(--gold)}
#gpsStatus.poor{background:rgba(255,68,68,.15);border:1px solid rgba(255,68,68,.3);color:#f44}
#gpsStatus.none{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#666}
#gpsDot{width:6px;height:6px;border-radius:50%;display:inline-block}
#gpsStatus.good #gpsDot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
#gpsStatus.fair #gpsDot{background:var(--gold);box-shadow:0 0 6px var(--gold)}
#gpsStatus.poor #gpsDot{background:#f44;box-shadow:0 0 6px #f44}
#gpsStatus.none #gpsDot{background:#666}

/* Accuracy ring on map */
.accuracy-ring{fill:rgba(0,170,255,.06);stroke:rgba(0,170,255,.2);stroke-width:1;animation:accPulse 3s infinite}
@keyframes accPulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

/* Heading cone */
.heading-cone{fill:rgba(0,170,255,.15);stroke:rgba(0,170,255,.4);stroke-width:1}

@media(min-width:768px){#bottom{max-height:35vh}.hud-title{font-size:14px}.stat .v{font-size:16px}}
@media(max-height:600px){#bottom{max-height:50vh}#bottom.collapsed{transform:translateY(calc(100% - 35px))}}
</style>
</head>
<body>

<div id="map"></div>
<canvas id="fogCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <div class="hud-title">⚔️ නිදන් Hunt <span class="v">ADV</span></div>
    <div class="hud-stats">
      <div class="stat"><div class="v" id="scr">0</div><div class="l">🏆 Score</div></div>
      <div class="stat"><div class="v" id="fnd">0/0</div><div class="l">📦 Found</div></div>
      <div class="stat"><div class="v" id="lvl">1</div><div class="l">⭐ Level</div></div>
    </div>
    <button id="locateBtn" style="background:rgba(0,170,255,.2);border:1px solid rgba(0,170,255,.4);border-radius:6px;color:#0af;font-size:14px;padding:2px 6px;cursor:pointer;pointer-events:auto" title="Toggle auto-follow">🎯</button>
  </div>
</div>

<!-- Zone Progress -->
<div id="zoneBar">
  <div class="zname"><span id="zTitle">Colombo</span><span id="zPct">0%</span></div>
  <div class="track"><div class="fill" id="zFill" style="width:0%"></div></div>
</div>

<!-- GPS Status -->
<div id="gpsStatus" class="none"><span id="gpsDot"></span><span id="gpsText">GPS: waiting...</span></div>

<!-- Direction arrow -->
<div id="dirArrow">🧭</div>

<!-- Collection Ring -->
<div id="collectRing">📡</div>

<!-- Bottom Sheet -->
<div id="bottom">
  <div class="h" id="bh"></div>
  <div class="hdr">
    <h3>🗺️ Zones <span class="b" id="zoneTotal">0</span></h3>
    <select class="zonesel" id="zoneSelect"><option value="">-- Select Zone --</option></select>
  </div>
  <div id="list"></div>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modalBox">
    <div class="icon" id="mIcon">💎</div>
    <h2 id="mTitle">Treasure</h2>
    <div class="tag" id="mTag">GEM</div>
    <div class="desc" id="mDesc">Description</div>
    <div class="meta" id="mMeta">0.0000, 0.0000 · Zone: Colombo</div>
    <div class="rw" id="mReward">+100 🏆</div>
    <div class="nrp" id="mNear">📍 0m away</div>
    <button class="act" id="mBtn">📍 Walk to collect (GPS)</button>
  </div>
</div>

<!-- Unlock Notification -->
<div id="unlockNotify">
  <div class="ico">🗺️</div>
  <h3 id="unlockTitle">Zone Unlocked!</h3>
  <p id="unlockDesc">You can now explore this area</p>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Achievement -->
<div id="achieve"><span class="aico" id="aIcon">🏆</span><span id="aText">Achievement!</span></div>

<script>
// =============================================
// ADVANCED SRI LANKA TREASURE HUNT
// Fog of War · Zone Unlock · GPS Collection
// =============================================

// ---- TYPES ----
const TYPES = [
  {id:'gem',icon:'💎',color:'#0ff',reward:55},
  {id:'artifact',icon:'🏺',color:'#f0f',reward:85},
  {id:'nature',icon:'🌿',color:'#0f0',reward:40},
  {id:'heritage',icon:'🏛️',color:'#ff0',reward:110},
  {id:'treasure',icon:'💰',color:'#f60',reward:130},

  {id:'waterfall',icon:'💧',color:'#0af',reward:50},
  {id:'wildlife',icon:'🐘',color:'#5f5',reward:65},
  {id:'pearl',icon:'🔮',color:'#ff8',reward:150}
];

// ---- ZONES ----
const ZONES = [
  {id:'colombo',name:'Colombo',nameSi:'කොළඹ',lat:6.9344,lng:79.8428,R:.13,icon:'🏙️',color:'#ff6b35',connections:['kandy','galle','ratnapura','kurunegala','negombo']},

  {id:'ratnapura',name:'Ratnapura',nameSi:'රත්නපුර',lat:6.6827,lng:80.4037,R:.10,icon:'💎',color:'#0ff',connections:['colombo','galle','kandy','badulla']},

  {id:'polo',name:'Polonnaruwa',nameSi:'පොළොන්නරුව',lat:7.9398,lng:81.0025,R:.09,icon:'🏚️',color:'#f44',connections:['anuradhapura','trinco','batticaloa']},
  {id:'badulla',name:'Badulla',nameSi:'බදුල්ල',lat:6.9833,lng:81.0500,R:.09,icon:'⛰️',color:'#5f5',connections:['kandy','ratnapura','batticaloa','nuwara']},
  {id:'kurunegala',name:'Kurunegala',nameSi:'කුරුණෑගල',lat:7.4833,lng:80.3667,R:.09,icon:'🐘',color:'#f80',connections:['colombo','kandy','anuradhapura']},
  {id:'nuwara',name:'Nuwara Eliya',nameSi:'නුවරඑළිය',lat:6.9700,lng:80.7829,R:.08,icon:'🌿',color:'#fff',connections:['kandy','badulla','ratnapura']},
  {id:'matara',name:'Matara',nameSi:'මාතර',lat:5.9500,lng:80.5333,R:.08,icon:'🌊',color:'#0af',connections:['galle','hambantota']},

  {id:'hambantota',name:'Hambantota',nameSi:'හම්බන්තොට',lat:6.1333,lng:81.1333,R:.09,icon:'🦁',color:'#f44',connections:['matara','badulla']},
  {id:'ampara',name:'Ampara',nameSi:'අම්පාර',lat:7.2833,lng:81.6667,R:.08,icon:'🌾',color:'#ff0',connections:['batticaloa','badulla']},
  {id:'vavuniya',name:'Vavuniya',nameSi:'වවුනියාව',lat:8.7500,lng:80.5000,R:.08,icon:'🌲',color:'#0f0',connections:['jaffna','mannar','anuradhapura']},
  {id:'negombo',name:'Negombo',nameSi:'මීගමුව',lat:7.2087,lng:79.8358,R:.08,icon:'🐟',color:'#0af',connections:['colombo','kurunegala']}
];

// ---- NAMES ----
const PREFIXES=['Hidden','Sunken','Lost','Ancient','Royal','Mystic','Crystal','Shadow','Emerald','Crimson','Sacred','Forgotten','Enchanted','Silent','Golden','Silver','Diamond','Velvet','Celestial','Dusk'];
const SUFFIXES=['Vault','Shrine','Cavern','Grotto','Mound','Peak','Valley','Forest','Lagoon','Cove','Tower','Well','Pool','Falls','Hill','Rock','Cave','Glen','Harbor','Reef'];

// =============================================
// GAME STATE
// =============================================
let map, fogCanvas, ctx;
let treasures = [];
let score = 0, level = 1, xp = 0;
let userPos = null, userMarker = null, userAccCircle = null, userHeadingLine = null;
let exploredLocs = [];
let currentZone = null;
let selectedZoneForList = null;
let modalTreasure = null;
let collectedTotal = 0;
let achievements = new Set();
let unlockQueue = [];
let autoFollow = true;
let heading = -1; // degrees, -1 = unknown
let gpsWatchId = null;
let lastGpsUpdate = 0;
let gpsAccuracy = Infinity;

const EXPLORE_RADIUS = 200; // meters - fog clears in this radius
const COLLECT_RADIUS = 50;  // meters - must be this close to collect
const XP_PER_LEVEL = 200;

// =============================================
// GENERATE TREASURES - ALL SRI LANKA GRID
// =============================================
// Rough Sri Lanka coastline polygon for land filtering
const LK_POLYGON = [
  [9.84,79.88],[9.82,80.02],[9.80,80.15],[9.78,80.27],[9.70,80.35],
  [9.55,80.42],[9.35,80.55],[9.20,80.70],[9.00,80.88],[8.80,81.05],
  [8.60,81.22],[8.45,81.35],[8.25,81.48],[8.00,81.58],[7.75,81.70],
  [7.50,81.78],[7.25,81.82],[7.00,81.80],[6.80,81.75],[6.55,81.58],
  [6.35,81.35],[6.20,81.10],[6.10,80.85],[6.00,80.60],[5.94,80.40],
  [5.95,80.20],[6.00,80.00],[6.10,79.95],[6.30,79.95],[6.50,79.95],
  [6.70,79.90],[6.90,79.85],[7.10,79.82],[7.35,79.78],[7.60,79.75],
  [7.85,79.75],[8.05,79.78],[8.20,79.75],[8.40,79.72],[8.60,79.70],
  [8.80,79.70],[9.00,79.75],[9.20,79.78],[9.40,79.82],[9.60,79.85],
  [9.75,79.85],[9.84,79.88]
];

function pointInPolygon(lat, lng) {
  let inside = false;
  for(let i=0,j=LK_POLYGON.length-1;i<LK_POLYGON.length;j=i++) {
    const xi=LK_POLYGON[i][1],yi=LK_POLYGON[i][0];
    const xj=LK_POLYGON[j][1],yj=LK_POLYGON[j][0];
    const intersect = ((yi>lat)!==(yj>lat)) && (lng<(xj-xi)*(lat-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

function generateTreasures() {
  const all = [];
  let id = 0;

  // Grid spacing: ~0.022° ≈ 2.4km for ~12,000 treasures across Sri Lanka
  const STEP = 0.022;
  const JITTER = STEP*0.35;
  const MIN_LAT=5.93, MAX_LAT=9.85;
  const MIN_LNG=79.68, MAX_LNG=81.88;

  // Reduce rewards for "low points"
  const lowTypes = TYPES.map(t=>({...t,reward:Math.round(t.reward*0.3)}));

  for(let lat=MIN_LAT; lat<=MAX_LAT; lat+=STEP) {
    for(let lng=MIN_LNG; lng<=MAX_LNG; lng+=STEP) {
      // Jitter
      const jlat = lat + (Math.random()-0.5)*JITTER;
      const jlng = lng + (Math.random()-0.5)*JITTER;

      // Skip if not on Sri Lanka landmass
      if(!pointInPolygon(jlat, jlng)) continue;

      // Determine which zone this belongs to (for zone UI)
      let nearestZone = null, nearDist = Infinity;
      for(const z of ZONES) {
        const d = getDist(jlat, jlng, z.lat, z.lng);
        if(d < nearDist) { nearDist=d; nearestZone=z.id; }
      }

      const t = lowTypes[Math.floor(Math.random()*lowTypes.length)];
      const p = PREFIXES[Math.floor(Math.random()*PREFIXES.length)];
      const s = SUFFIXES[Math.floor(Math.random()*SUFFIXES.length)];
      all.push({
        id:id++, z:nearestZone||'colombo', lat:jlat, lng:jlng, ti:t,
        n:`${p} ${s}`,
        d:1+Math.floor(Math.random()*5),
        c:false
      });
    }
  }
  return all;
}

// =============================================
// SAVE/LOAD
// =============================================
function save() {
  try {
    const data = {s:score,l:level,x:xp,ex:exploredLocs,
      tr:treasures.filter(t=>t.c).map(t=>t.id),
      ac:Array.from(achievements)};
    localStorage.setItem('nd_adv',JSON.stringify(data));
  }catch(e){}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('nd_adv'));
    if(!d) return false;
    score=d.s||0; level=d.l||1; xp=d.x||0;
    exploredLocs=d.ex||[];
    achievements=new Set(d.ac||[]);
    const collected = new Set(d.tr||[]);
    for(const t of treasures) {
      if(collected.has(t.id)) {t.c=true;collectedTotal++;}
    }
    return true;
  }catch(e){return false;}
}

    }

function resizeCanvas() {
  const s = map.getSize();
  fogCanvas.width = s.x;
  fogCanvas.height = s.y;
  fogCanvas.style.width = s.x+'px';
  fogCanvas.style.height = s.y+'px';
  render();
}

// =============================================
// FOG OF WAR RENDER
// =============================================
function render() {
  if(!ctx || !map) return;
  const s = map.getSize();
  if(fogCanvas.width !== s.x || fogCanvas.height !== s.y) {
    fogCanvas.width = s.x;
    fogCanvas.height = s.y;
  }

  const W = fogCanvas.width, H = fogCanvas.height;
  ctx.clearRect(0,0,W,H);

  // 1. Draw fog
  const fog = ctx.createRadialGradient(W/2,H/2,W*0.7,W/2,H/2,W*0.3);
  ctx.fillStyle = 'rgba(5,5,22,0.92)';
  ctx.fillRect(0,0,W,H);

  // 2. Clear explored areas
  if(exploredLocs.length > 0) {
    const Z = map.getZoom();
    // Batch rendering for performance
    for(const loc of exploredLocs) {
      // Skip explored points far outside viewport
      const p = map.latLngToContainerPoint([loc.lat,loc.lng]);
      const mPerPx = 156543.03392 * Math.cos(loc.lat*Math.PI/180) / Math.pow(2,Z);
      const pr = EXPLORE_RADIUS / mPerPx;
      const margin = pr * 1.2;
      if(p.x < -margin || p.x > W+margin || p.y < -margin || p.y > H+margin) continue;

      const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,pr);
      grad.addColorStop(0,'rgba(0,0,0,1)');
      grad.addColorStop(0.6,'rgba(0,0,0,1)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x,p.y,pr,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  // 3. Draw zone labels (for unlocked zones)
  ctx.globalCompositeOperation = 'source-over';
  for(const z of ZONES) {
    if(!isZoneUnlocked(z.id)) continue;
    const p = map.latLngToContainerPoint([z.lat,z.lng]);
    if(p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) continue;

    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Glow
    ctx.shadowColor = z.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = z.color;
    ctx.fillText(`${z.icon} ${z.name}`,p.x,p.y-22);
    ctx.shadowBlur = 0;
  }

  // 4. Draw treasures in explored areas
  const viewBounds = map.getBounds();
  let chestCount = 0;
  for(const t of treasures) {
    if(t.c) continue;
    if(!isExplored(t.lat,t.lng)) continue;

    const p = map.latLngToContainerPoint([t.lat,t.lng]);
    if(p.x < -15 || p.x > W+15 || p.y < -15 || p.y > H+15) continue;

    chestCount++;
    const icon = t.ti.icon;
    const isNearby = userPos && getDist(userPos.lat,userPos.lng,t.lat,t.lng) < COLLECT_RADIUS*2;

    // Pulsing effect for nearby treasures
    if(isNearby) {
      const pulse = 1 + 0.15 * Math.sin(Date.now()/300);
      ctx.font = `${Math.round(20*pulse)}px serif`;
      ctx.shadowColor = t.ti.color;
      ctx.shadowBlur = 20;
    } else {
      ctx.font = '16px serif';
      ctx.shadowBlur = 4;
      ctx.shadowColor = t.ti.color;
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon,p.x,p.y);
    ctx.shadowBlur = 0;

    // Difficulty dots
    if(isNearby && Z >= 14) {
      ctx.fillStyle = '#ffd700';
      for(let i=0;i<t.d;i++) {
        ctx.beginPath();
        ctx.arc(p.x-8+i*4,p.y+11,1.5,0,Math.PI*2);
        ctx.fill();
      }
    }
  }

  fogCanvas.dataset.chests = chestCount;
}

// =============================================
// EXPLORATION
// =============================================
function isExplored(lat,lng) {
  for(const loc of exploredLocs) {
    if(getDist(lat,lng,loc.lat,loc.lng) < EXPLORE_RADIUS) return true;
  }
  return false;
}

function addExplored(lat,lng) {
  // Don't add if already explored nearby
  for(const loc of exploredLocs) {
    if(getDist(lat,lng,loc.lat,loc.lng) < EXPLORE_RADIUS*0.5) return;
  }
  exploredLocs.push({lat,lng});
  render();
}

function isZoneUnlocked(zid) {
  // All zones unlocked by default - treasures are everywhere!
  return true;
}

// =============================================
// GPS - REAL-TIME MOBILE TRACKING
// =============================================
function startGps() {
  const opts = {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 1000 // accept 1s old positions for faster updates
  };

  gpsWatchId = navigator.geolocation.watchPosition(onPos, onPosErr, opts);

  // Also try to get heading from DeviceOrientation if available
  if(window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', function(evt) {
      if(evt.webkitCompassHeading != null) {
        heading = evt.webkitCompassHeading;
      } else if(evt.alpha != null) {
        heading = 360 - evt.alpha; // convert to compass heading
      }
    }, true);
  }
}

function updateGpsStatus(state, text) {
  const el = document.getElementById('gpsStatus');
  el.className = state;
  document.getElementById('gpsText').textContent = text;
}

function updateAccuracyRing(lat, lng, acc) {
  if(userAccCircle) map.removeLayer(userAccCircle);
  if(acc < 200) {
    userAccCircle = L.circle([lat, lng], {
      radius: acc,
      className: 'accuracy-ring',
      color: acc < 30 ? '#0f8' : acc < 80 ? '#ff0' : '#f44',
      fillColor: acc < 30 ? '#0f8' : acc < 80 ? '#ff0' : '#f44',
      fillOpacity: 0.04,
      weight: 1,
      opacity: 0.3,
      interactive: false
    }).addTo(map);
  }
}

function updateHeadingLine(lat, lng, head) {
  if(userHeadingLine) map.removeLayer(userHeadingLine);
  if(head < 0) return;
  const dist = 0.002; // ~200m line
  const rad = head * Math.PI / 180;
  const endLat = lat + dist * Math.cos(rad);
  const endLng = lng + dist * Math.sin(rad);

  // Triangles pointing in heading direction (small)
  const midLat = lat + dist * 0.5 * Math.cos(rad);
  const midLng = lng + dist * 0.5 * Math.sin(rad);

  userHeadingLine = L.polyline([[lat, lng], [endLat, endLng]], {
    color: '#0af', weight: 2, opacity: 0.4, interactive: false
  }).addTo(map);
}

function onPos(pos) {
  const {latitude:lat, longitude:lng, accuracy, heading:gpsHeading, speed} = pos.coords;
  const now = Date.now();
  lastGpsUpdate = now;
  gpsAccuracy = accuracy;

  // Update heading from GPS if available (more reliable than compass)
  if(gpsHeading != null && gpsHeading >= 0) heading = gpsHeading;

  userPos = {lat, lng};

  // --- User marker with rotation (heading) ---
  const headDeg = heading >= 0 ? heading : 0;
  if(!userMarker) {
    userMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="position:relative;width:24px;height:24px">
          <!-- Main dot -->
          <div class="user-dot" style="position:absolute;top:6px;left:6px"></div>
          ${heading >= 0 ? `<div style="position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:8px;opacity:0.7">▲</div>` : ''}
        </div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      })
    }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
    // Update marker rotation for heading
    if(heading >= 0) {
      userMarker.setRotationAngle ? userMarker.setRotationAngle(headDeg) : null;
    }
  }

  // --- Accuracy ring ---
  updateAccuracyRing(lat, lng, accuracy);

  // --- Heading line ---
  if(heading >= 0) updateHeadingLine(lat, lng, heading);
  else if(userHeadingLine) { map.removeLayer(userHeadingLine); userHeadingLine = null; }

  // --- GPS status indicator ---
  let gpsState = 'none', gpsText = 'GPS: searching...';
  if(accuracy < 20) { gpsState = 'good'; gpsText = `GPS: ${accuracy}m (high)`; }
  else if(accuracy < 60) { gpsState = 'good'; gpsText = `GPS: ${accuracy}m`; }
  else if(accuracy < 120) { gpsState = 'fair'; gpsText = `GPS: ${accuracy}m`; }
  else if(accuracy < 500) { gpsState = 'poor'; gpsText = `GPS: ${accuracy}m (low)`; }
  else { gpsState = 'poor'; gpsText = `GPS: ${accuracy}m (weak)`; }
  if(speed != null && speed > 0.5) gpsText += ` ${(speed*3.6).toFixed(1)}km/h`;
  updateGpsStatus(gpsState, gpsText);

  // --- Auto-follow: move map to keep user centered ---
  if(autoFollow) {
    map.panTo([lat, lng], {animate: true, duration: 0.3});
  }

  // First fix: fly to user location
  if(!window._firstFix) {
    window._firstFix = true;
    map.flyTo([lat, lng], 15, {duration: 1.5});
  }

  // --- Explore: add to fog-cleared areas ---
  addExplored(lat, lng);

  // --- Zone detection ---
  let nearest = null, nearDist = Infinity;
  for(const z of ZONES) {
    const d = getDist(lat, lng, z.lat, z.lng);
    if(d < nearDist) { nearDist = d; nearest = z.id; }
  }
  const cz = ZONES.find(z=>z.id===nearest);
  if(cz && nearDist < cz.R*111000*2) {
    if(currentZone !== nearest) {
      currentZone = nearest;
      renderZones();
      updateHUD();
      showToast(`📍 Entered ${cz.nameSi} zone!`);
      checkAchievements();
    }
  }
  currentZone = nearest;

  // --- Auto-collect nearby treasures ---
  let collected = false;
  for(const t of treasures) {
    if(t.c) continue;
    if(getDist(lat, lng, t.lat, t.lng) < COLLECT_RADIUS) {
      collectTreasure(t);
      collected = true;
    }
  }

  // --- UI updates ---
  updateHUD();
  renderZones();
  render();

  // --- Collection ring (radar glow) ---
  const nearCount = treasures.filter(t=>!t.c && getDist(lat,lng,t.lat,t.lng) < COLLECT_RADIUS*2).length;
  document.getElementById('collectRing').classList.toggle('show', nearCount > 0);

  // --- Direction arrow toward nearest uncollected treasure ---
  let nearestT = null, nearestTD = COLLECT_RADIUS * 8;
  for(const t of treasures) {
    if(t.c) continue;
    const d = getDist(lat, lng, t.lat, t.lng);
    if(d < nearestTD) { nearestTD = d; nearestT = t; }
  }
  const arrow = document.getElementById('dirArrow');
  if(nearestT) {
    const angle = Math.atan2(nearestT.lng - lng, nearestT.lat - lat) * 180 / Math.PI;
    const distStr = nearestTD < 1000 ? `${Math.round(nearestTD)}m` : `${(nearestTD/1000).toFixed(1)}km`;
    arrow.textContent = `🧭 ${distStr}`;
    arrow.style.transform = `translateX(-50%) rotate(${angle}deg)`;
    arrow.classList.add('show');
  } else {
    arrow.classList.add('show');
    arrow.textContent = '✅ All cleared!';
    arrow.style.transform = 'translateX(-50%)';
    setTimeout(() => arrow.classList.remove('show'), 2000);
  }

  // --- Process zone unlocks ---
  processUnlocks();
}

function onPosErr(e) {
  const errors = {
    1: 'Permission denied - allow GPS access in browser settings',
    2: 'GPS unavailable - try moving outdoors',
    3: 'GPS timeout - check location settings'
  };
  const msg = errors[e.code] || `GPS error: ${e.message}`;
  updateGpsStatus('none', msg);

  // Fallback: center on Colombo if first fix never arrived
  if(!window._firstFix && !userPos) {
    userPos = {lat: 6.9344, lng: 79.8428};
    addExplored(6.9344, 79.8428);
    currentZone = 'colombo';
    map.setView([6.9344, 79.8428], 12);
    updateHUD();
    renderZones();
    render();
    showToast('📍 Using Colombo as fallback location');
  }
}

// Watchdog: restart GPS if no update for 15s
setInterval(() => {
  if(gpsWatchId == null) return;
  if(Date.now() - lastGpsUpdate > 15000) {
    navigator.geolocation.clearWatch(gpsWatchId);
    startGps();
    updateGpsStatus('none', 'GPS: reconnecting...');
  }
}, 5000);

// =============================================
// COLLECTION
// =============================================
function collectTreasure(t) {
  if(t.c) return;
  t.c = true;
  collectedTotal++;
  const rw = t.ti.reward * t.d;
  score += rw;
  xp += rw;

  // Level up
  while(xp >= XP_PER_LEVEL*level) {
    xp -= XP_PER_LEVEL*level;
    level++;
    showAchievement('⬆️',`Level ${level} reached!`);
  }

  save();
  updateHUD();
  renderZones();
  render();
  showToast(`📦 ${t.n} +${rw} 🏆`);
  checkAchievements();
}

function onCollectFromModal() {
  if(!modalTreasure) return;
  const t = modalTreasure;
  if(t.c) {closeModal(); return;}

  if(!userPos) {
    showToast('📍 GPS not available yet');
    return;
  }
  const d = getDist(userPos.lat,userPos.lng,t.lat,t.lng);
  if(d < COLLECT_RADIUS) {
    collectTreasure(t);
    closeModal();
  } else {
    showToast(`📍 ${Math.round(d)}m away - move closer! (${COLLECT_RADIUS}m needed)`);
  }
}

// =============================================
// CANVAS CLICK
// =============================================
function onMapClick(e) {
  const {lat,lng} = e.latlng;
  // Find nearest treasure within 30px of click
  const clickPx = map.latLngToContainerPoint([lat,lng]);
  let nearest = null, nearDist = 30;
  for(const t of treasures) {
    if(t.c) continue;
    if(!isExplored(t.lat,t.lng)) continue;
    const tp = map.latLngToContainerPoint([t.lat,t.lng]);
    const d = Math.sqrt((tp.x-clickPx.x)**2 + (tp.y-clickPx.y)**2);
    if(d < nearDist) {nearDist = d; nearest = t;}
  }
  if(nearest) openModal(nearest);
}

// =============================================
// MODAL
// =============================================
function openModal(t) {
  modalTreasure = t;
  document.getElementById('mIcon').textContent = t.ti.icon;
  document.getElementById('mTitle').textContent = t.n;
  const tag = document.getElementById('mTag');
  tag.textContent = t.ti.id.toUpperCase();
  tag.style.background = t.ti.color+'30';
  tag.style.color = t.ti.color;

  const zone = ZONES.find(z=>z.id===t.z);
  document.getElementById('mDesc').textContent = `${t.n} treasure hidden in ${zone?zone.name:t.z}! Explore the area to find it.`;
  document.getElementById('mMeta').textContent = `${t.lat.toFixed(4)}, ${t.lng.toFixed(4)} · ${zone?zone.nameSi:t.z}`;
  document.getElementById('mReward').textContent = `+${t.ti.reward * t.d} 🏆 · ⭐ Diff ${t.d}/5`;
  document.getElementById('mReward').style.color = t.ti.color;

  const btn = document.getElementById('mBtn');
  if(t.c) {
    btn.textContent = '✅ Already Collected!';
    btn.style.background = '#444';
    btn.style.boxShadow = 'none';
    btn.disabled = true;
  } else if(!userPos) {
    btn.textContent = '📍 Waiting for GPS...';
    btn.style.background = '#555';
    btn.disabled = false;
  } else {
    const d = getDist(userPos.lat,userPos.lng,t.lat,t.lng);
    document.getElementById('mNear').textContent = `📍 ${Math.round(d)}m away (need ${COLLECT_RADIUS}m)`;
    if(d < COLLECT_RADIUS) {
      btn.textContent = '📦 Collect Now!';
      btn.style.background = 'linear-gradient(135deg,var(--gold),var(--primary))';
      btn.disabled = false;
    } else {
      btn.textContent = `📍 ${Math.round(d)}m away - Move closer`;
      btn.style.background = 'linear-gradient(135deg,var(--primary),var(--accent))';
      btn.disabled = false;
    }
  }

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  modalTreasure = null;
}

// =============================================
// ZONE LIST
// =============================================
function renderZones() {
  const list = document.getElementById('list');
  const sel = document.getElementById('zoneSelect');
  list.innerHTML = '';

  // Update select options
  const prevVal = sel.value;
  sel.innerHTML = '<option value="">-- All Zones --</option>';
  for(const z of ZONES) {
    const opt = document.createElement('option');
    opt.value = z.id;
    const total = treasures.filter(t=>t.z===z.id);
    const found = total.filter(t=>t.c);
    opt.textContent = `${z.icon} ${z.name} (${found.length}/${total.length})`;
    sel.appendChild(opt);
  }
  sel.value = prevVal || '';

  // Show zones or treasures
  if(selectedZoneForList) {
    showTreasuresForZone(selectedZoneForList, list);
  } else {
    showAllZones(list);
  }
}

function showAllZones(container) {
  for(const z of ZONES) {
    const total = treasures.filter(t=>t.z===z.id);
    const found = total.filter(t=>t.c);
    const pct = total.length > 0 ? Math.round(found.length/total.length*100) : 0;
    const unlocked = isZoneUnlocked(z.id);

    const card = document.createElement('div');
    card.className = 'zone-card';
    card.innerHTML = `
      <div class="ico">${z.icon}</div>
      <div class="info">
        <div class="zn">
          <span>${z.name} <span style="color:#888;font-size:9px">${z.nameSi}</span></span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="bar"><div class="f" style="width:${pct}%;background:${z.color}"></div></div>
      </div>
      <div class="lock ${unlocked?'u':'l'}">${unlocked?'🔓':'🔒'}</div>
    `;
    card.addEventListener('click',()=>{
      selectedZoneForList = z.id;
      document.getElementById('zoneSelect').value = z.id;
      showTreasuresForZone(z.id, container);
    });
    container.appendChild(card);
  }
}

function showTreasuresForZone(zid, container) {
  const zone = ZONES.find(z=>z.id===zid);
  const zoneTreasures = treasures.filter(t=>t.z===zid);
  const found = zoneTreasures.filter(t=>t.c);
  const unlocked = isZoneUnlocked(zid);

  // Header
  const hdr = document.createElement('div');
  hdr.style.cssText = 'padding:6px 4px;font-size:11px;color:var(--gold);display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,215,0,.1);margin-bottom:4px';
  hdr.innerHTML = `<span>${zone?zone.icon:''} ${zone?zone.name:zid}</span><span>${found.length}/${zoneTreasures.length} · ${zoneTreasures.length>0?Math.round(found.length/zoneTreasures.length*100):0}%</span>`;
  container.appendChild(hdr);

  // Back button
  const back = document.createElement('div');
  back.style.cssText = 'padding:4px;font-size:11px;color:#888;cursor:pointer;margin-bottom:4px';
  back.textContent = '← Back to all zones';
  back.addEventListener('click',()=>{
    selectedZoneForList = null;
    document.getElementById('zoneSelect').value = '';
    renderZones();
  });
  container.appendChild(back);

  if(!unlocked) {
    const locked = document.createElement('div');
    locked.style.cssText = 'text-align:center;padding:20px;color:#555;font-size:12px';
    locked.innerHTML = '🔒 This zone is locked<br><span style="font-size:10px">Collect treasures in connected zones to unlock</span>';
    container.appendChild(locked);
    return;
  }

  // Sort: uncollected first
  const sorted = [...zoneTreasures].sort((a,b)=>a.c===b.c?0:a.c?1:-1);

  // Show only first 50 in list for performance, with show more
  const showCount = Math.min(50, sorted.length);
  for(let i=0;i<showCount;i++) {
    const t = sorted[i];
    const item = document.createElement('div');
    item.className = 't-item';
    const distStr = userPos ? Math.round(getDist(userPos.lat,userPos.lng,t.lat,t.lng))+'m' : '';
    item.innerHTML = `
      <div class="ico">${t.c?'✅':t.ti.icon}</div>
      <div class="inf">
        <div class="nm">${t.n}</div>
        <div class="sb"><span>${t.ti.icon} ${t.ti.id}</span><span>${'★'.repeat(t.d)}</span></div>
      </div>
      ${distStr ? `<div class="dist">📍${distStr}</div>` : ''}
      <div class="st ${t.c?'f':'m'}">${t.c?'✅':'⬜'}</div>
    `;
    if(!t.c) {
      item.addEventListener('click',()=>{
        if(!isExplored(t.lat,t.lng)) {
          showToast('❄️ This treasure is hidden in fog - explore the area!');
          map.flyTo([t.lat,t.lng],14);
          return;
        }
        openModal(t);
      });
    }
    container.appendChild(item);
  }

  if(sorted.length > 50) {
    const more = document.createElement('div');
    more.style.cssText = 'text-align:center;padding:8px;font-size:10px;color:#555';
    more.textContent = `+ ${sorted.length-50} more treasures in this zone`;
    container.appendChild(more);
  }
}

// =============================================
// ACHIEVEMENTS & UNLOCKS
// =============================================
function checkAchievements() {
  if(collectedTotal >= 50 && !achievements.has('50')) {
    achievements.add('50'); showAchievement('🎯','Collected 50 treasures!'); save();
  }
  if(collectedTotal >= 200 && !achievements.has('200')) {
    achievements.add('200'); showAchievement('🏆','Collected 200 treasures!'); save();
  }
  if(collectedTotal >= 500 && !achievements.has('500')) {
    achievements.add('500'); showAchievement('💎','Collected 500 treasures!'); save();
  }
  if(collectedTotal >= 1000 && !achievements.has('1000')) {
    achievements.add('1000'); showAchievement('👑','Collected 1000 treasures!'); save();
  }
  if(collectedTotal >= 2500 && !achievements.has('2500')) {
    achievements.add('2500'); showAchievement('🌟','Collected 2500 treasures!'); save();
  }
  if(level >= 10 && !achievements.has('l10')) {
    achievements.add('l10'); showAchievement('⭐','Reached Level 10!'); save();
  }
  if(level >= 25 && !achievements.has('l25')) {
    achievements.add('l25'); showAchievement('🔥','Reached Level 25!'); save();
  }

  // Milestone: each zone has treasures collected (all zones now active)
  const zoneCounts = {};
  for(const z of ZONES) {
    const f = treasures.filter(t=>t.c && t.z===z.id).length;
    if(f >= 100) zoneCounts[z.id] = '100';
    else if(f >= 50) zoneCounts[z.id] = '50';
    else if(f >= 10) zoneCounts[z.id] = '10';
  }
  // Check zone milestones
  const zoneM = Object.keys(zoneCounts).length;
  if(zoneM >= 18 && !achievements.has('allZones10')) {
    achievements.add('allZones10'); showAchievement('🗺️','Treasures in all 18 zones!'); save();
  }
}

function queueUnlock(z) {
  unlockQueue.push(z);
}

function processUnlocks() {
  for(const z of unlockQueue) {
    document.getElementById('unlockTitle').textContent = `🗺️ ${z.name} Complete!`;
    document.getElementById('unlockDesc').textContent = `All ${treasures.filter(t=>t.z===z.id).length} treasures found in ${z.name}!`;
    document.getElementById('unlockNotify').classList.add('show');
    setTimeout(()=>document.getElementById('unlockNotify').classList.remove('show'),3000);
  }
  unlockQueue = [];
}

// =============================================
// UI UPDATES
// =============================================
function updateHUD() {
  const fnd = collectedTotal || treasures.filter(t=>t.c).length;
  document.getElementById('scr').textContent = score;
  document.getElementById('fnd').textContent = `${fnd}/${treasures.length}`;
  document.getElementById('lvl').textContent = level;

  // Zone bar
  if(currentZone) {
    const z = ZONES.find(zz=>zz.id===currentZone);
    if(z) {
      document.getElementById('zTitle').textContent = `${z.icon} ${z.nameSi} (${z.name})`;
      const total = treasures.filter(t=>t.z===currentZone);
      const found = total.filter(t=>t.c);
      const pct = total.length > 0 ? Math.round(found.length/total.length*100) : 0;
      document.getElementById('zPct').textContent = `${found.length}/${total.length} (${pct}%)`;
      document.getElementById('zFill').style.width = Math.min(100,pct)+'%';
    }
  }
  document.getElementById('zoneTotal').textContent = collectedTotal || treasures.filter(t=>t.c).length;
}

// =============================================
// NOTIFICATIONS
// =============================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'),2500);
}

function showAchievement(ico,text) {
  const el = document.getElementById('achieve');
  document.getElementById('aIcon').textContent = ico;
  document.getElementById('aText').textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'),3000);
}

// =============================================
// UTILITY
// =============================================
function getDist(lat1,lng1,lat2,lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Pulse nearby treasures every 2s
setInterval(()=>{
  if(!userPos || !ctx) return;
  const Z = map.getZoom();
  const s = map.getSize();
  for(const t of treasures) {
    if(t.c) continue;
    if(!isExplored(t.lat,t.lng)) continue;
    if(getDist(t.lat,t.lng,userPos.lat,userPos.lng) > COLLECT_RADIUS*2.5) continue;
    const p = map.latLngToContainerPoint([t.lat,t.lng]);
    if(p.x<0||p.x>s.x||p.y<0||p.y>s.y) continue;
    const pulse = 1 + 0.15 * Math.sin(Date.now()/300);
    ctx.font = `${Math.round(20*pulse)}px serif`;
    ctx.shadowColor = t.ti.color;
    ctx.shadowBlur = 20*(pulse-0.8);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.ti.icon,p.x,p.y);
    ctx.shadowBlur = 0;
  }
},2000);

// START
// =============================================
document.addEventListener('DOMContentLoaded',()=>{
  init();
});
</script>
